<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>卷帘门远程控制</title>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto; background: #f4f6f9; margin: 0; padding: 15px; }
    .container { max-width: 480px; margin: auto; background: #fff; padding: 20px; border-radius: 16px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
    h2 { text-align: center; margin-bottom: 20px; color: #333; }
    .status-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 14px; }
    .badge { padding: 6px 12px; border-radius: 20px; color: #fff; font-size: 13px; font-weight: bold; }
    .online { background: #34c759; }
    .offline { background: #ff3b30; }
    .door-state { font-size: 26px; font-weight: bold; text-align: center; margin: 20px 0; padding: 15px; border-radius: 12px; background: #f8f9fa; }
    
    .btn { width: 100%; padding: 16px; margin: 8px 0; border: none; border-radius: 12px; font-size: 17px; font-weight: bold; color: #fff; cursor: pointer; }
    .btn:active { transform: scale(0.97); }
    .up    { background: #007aff; }
    .down  { background: #ff9500; }
    .stop  { background: #ff3b30; }
    .learn { background: #5856d6; }
    .ota   { background: #34c759; }


    .card { margin-top: 20px; padding: 18px; background: #fafafa; border-radius: 12px; border: 1px solid #eee; }
    .learn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 10px; }
</style>
</head>
<body>


<div class="container">
    <h2>🚪 卷帘门远程控制</h2>


    <div class="status-container">
        <div>状态：<span id="status" class="badge offline">断开</span></div>
        <div>设备ID: <span id="deviceIdDisplay" style="font-weight:bold;color:#007aff;"></span></div>
    </div>


    <div id="doorStateDisplay" class="door-state">⚪ 等待设备状态...</div>


    <!-- 主控制 -->
    <button class="btn up" onclick="sendCommand('UP')">▲ 上升 / 开门</button>
    <button class="btn down" onclick="sendCommand('DOWN')">▼ 下降 / 关门</button>
    <button class="btn stop" onclick="sendCommand('STOP')">⏹ 停止</button>


    <!-- 学习区 -->
    <div class="card">
        <h3>📡 遥控器学习</h3>
        <p style="font-size:14px;color:#666;margin:8px 0;">点击下方按钮后，在10秒内按原遥控器对应按键</p>
        
        <div class="learn-grid">
            <button class="btn learn" onclick="startLearn('LEARN_UP')">学习 ↑</button>
            <button class="btn learn" onclick="startLearn('LEARN_DOWN')">学习 ↓</button>
            <button class="btn learn" onclick="startLearn('LEARN_STOP')">学习 ⏹</button>
        </div>
    </div>


    <!-- 系统维护 -->
    <div class="card">
        <h3>⚙️ 系统维护</h3>
        <button class="btn ota" onclick="triggerOTA()">🚀 远程 OTA 升级</button>
    </div>
</div>


<script>
// ==================== 配置 ====================
let deviceId = localStorage.getItem("user_door_id");


if (!deviceId) {
    deviceId = prompt("请输入设备ID（例如: door_2f3a4b5c）", "door_");
    if (deviceId) localStorage.setItem("user_door_id", deviceId);
}


document.getElementById("deviceIdDisplay").innerText = deviceId;


const cmdTopic = `door/${deviceId}/cmd`;
const statusTopic = `door/${deviceId}/status`;


const client = mqtt.connect("wss://b7fea2bf.ala.asia-southeast1.emqxsl.com:8084/mqtt", {
    clientId: "web_" + Math.random().toString(16).substr(2, 8),
    username: "eps8266nn",
    password: "yu155414",
    reconnectPeriod: 4000
});


let lastSeen = 0;


// ==================== 连接 ====================
client.on("connect", () => {
    console.log("✅ 已连接到 MQTT");
    document.getElementById("status").className = "badge online";
    document.getElementById("status").innerText = "已连接";
    
    client.subscribe(statusTopic, { qos: 1 });
    setTimeout(() => sendCommand("STATUS"), 600);
});


client.on("close", () => {
    document.getElementById("status").className = "badge offline";
    document.getElementById("status").innerText = "已断开";
});


// ==================== 接收消息 ====================
client.on("message", (topic, message) => {
    const msg = message.toString().trim();
    console.log("收到设备消息:", msg);
    lastSeen = Date.now();


    const display = document.getElementById("doorStateDisplay");


    if (msg === "UP_OK" || msg === "UP") {
        display.innerHTML = `<span style="color:#007aff">▲ 正在上升...</span>`;
    } else if (msg === "DOWN_OK" || msg === "DOWN") {
        display.innerHTML = `<span style="color:#ff9500">▼ 正在下降...</span>`;
    } else if (msg === "STOP_OK" || msg === "STOP") {
        display.innerHTML = `<span style="color:#34c759">⏹ 已停止</span>`;
    } else if (msg === "LEARNING") {
        display.innerHTML = `<span style="color:#5856d6">📡 正在学习遥控器信号...</span>`;
    } else if (msg === "LEARN_OK") {
        display.innerHTML = `<span style="color:#34c759">✅ 学习成功！</span>`;
    } else if (msg === "LEARN_TIMEOUT") {
        display.innerHTML = `<span style="color:#ff3b30">⏰ 学习超时</span>`;
    } else if (msg === "LEARN_MODE" || msg === "LEARN_MANUAL") {
        display.innerHTML = `<span style="color:#5856d6">📡 请按原遥控器按钮</span>`;
    }
});


// 离线检测
setInterval(() => {
    if (Date.now() - lastSeen > 35000) {
        document.getElementById("doorStateDisplay").innerHTML = 
            `<span style="color:#ff3b30">🔴 设备离线或未通电</span>`;
    }
}, 5000);


// ==================== 发送指令 ====================
function sendCommand(cmd) {
    if (client.connected) {
        client.publish(cmdTopic, cmd, { qos: 1 });
        console.log("发送指令:", cmd);
    } else {
        alert("未连接到服务器，请刷新页面");
    }
}


function startLearn(type) {
    if (confirm(`确定要学习【${type === 'LEARN_UP' ? '上升' : type === 'LEARN_DOWN' ? '下降' : '停止'}】按键吗？\n\n请在点击确定后10秒内按原遥控器对应按钮`)) {
        sendCommand(type);
    }
}


function triggerOTA() {
    if (confirm("确定要进行远程固件升级吗？\n升级期间设备会重启。")) {
        sendCommand("OTA");
    }
}
</script>
</body>
</html>
