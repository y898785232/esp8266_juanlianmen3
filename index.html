<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>卷帘门控制中心</title>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<style>
/* 你的原有样式保持不变 */
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto; background: #f4f6f9; margin: 0; padding: 15px; }
.container { max-width: 480px; margin: auto; background: #fff; padding: 20px; border-radius: 16px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
h2 { text-align: center; margin-bottom: 20px; }
.status-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 14px; color: #555; }
.badge { padding: 6px 12px; border-radius: 20px; color: #fff; font-size: 13px; font-weight: bold; }
.online { background: #34c759; }
.offline { background: #ff3b30; }
.door-state { font-size: 24px; font-weight: bold; text-align: center; margin: 15px 0; color: #333; padding: 10px; background: #f8f9fa; border-radius: 8px; }
.btn { width: 100%; padding: 14px; margin: 8px 0; border: none; border-radius: 10px; font-size: 16px; color: #fff; font-weight: bold; cursor: pointer; transition: 0.1s; }
.btn:active { transform: scale(0.98); opacity: 0.9; }
.up { background: #007aff; }
.down { background: #ff9500; }
.stop { background: #ff3b30; }
.ota { background: #5856d6; }
.card { margin-top: 15px; padding: 15px; border: 1px solid #eee; border-radius: 12px; background: #fafafa; }
</style>
</head>
<body>


<div class="container">
<h2>🚪 卷帘门控制中心</h2>


<div class="status-container">
    <div>服务器：<span id="status" class="badge offline">断开</span></div>
    <div>设备ID: <span id="currentIdDisplay" style="font-weight:bold;color:#007aff;">-</span> <button class="id-btn" onclick="changeDeviceId()">修改</button></div>
</div>


<div id="doorStateDisplay" class="door-state">⚪ 状态同步中...</div>


<button class="btn up" onclick="send('UP')">▲ 开启卷帘门 (上升)</button>
<button class="btn down" onclick="send('DOWN')">▼ 关闭卷帘门 (下降)</button>
<button class="btn stop" onclick="send('STOP')">⏹ 紧急停止</button>


<div class="card">
    <h3>⏰ 智能自动定时</h3>
    <div style="display: flex; align-items: center;">
        <label style="margin: 0;">是否启用定时：</label>
        <input type="checkbox" id="enable">
    </div>
    <label>自动开门时间 (上升)</label>
    <input type="time" id="start" value="08:00">
    <label>自动关门时间 (下降)</label>
    <input type="time" id="end" value="18:00">
    <button class="btn up" style="margin-top: 15px; background: #34c759;" onclick="saveTimer()">💾 保存配置并同步到门</button>
</div>


<div class="card">
    <h3>⚙️ 系统维护</h3>
    <button class="btn ota" onclick="triggerOTA()">🚀 远程 OTA 固件无线升级</button>
</div>
</div>


<script>
// ================= 设备ID =================
let deviceId = localStorage.getItem("user_door_id") || prompt("请输入设备ID (例如: door_123456)") || "door_unknown";
if (deviceId) localStorage.setItem("user_door_id", deviceId);
document.getElementById("currentIdDisplay").innerText = deviceId;


function changeDeviceId() {
    const newId = prompt("请输入新的设备ID:", deviceId);
    if (newId && newId.trim() !== "") {
        localStorage.setItem("user_door_id", newId.trim());
        location.reload();
    }
}


// ================= MQTT 配置（已修正）=================
const cmdTopic = `door/${deviceId}/cmd`;
const statusTopic = `door/${deviceId}/status`;


const client = mqtt.connect(
    "wss://b7fea2bf.ala.asia-southeast1.emqxsl.com:8084/mqtt",   // ← 关键修正：8084
    {
        clientId: "web_client_" + Math.random().toString(16).substr(2, 8),
        username: "eps8266nn",
        password: "yu155414",
        reconnectPeriod: 5000,
        connectTimeout: 10000
    }
);


let lastSeen = 0;


client.on("connect", () => {
    console.log("✅ Web 已连接 MQTT Broker");
    document.getElementById("status").className = "badge online";
    document.getElementById("status").innerText = "已连云端";
    client.subscribe(statusTopic, { qos: 1 });
    setTimeout(() => send("STATUS"), 800);
});


client.on("close", () => {
    document.getElementById("status").className = "badge offline";
    document.getElementById("status").innerText = "断开";
});


client.on("message", (topic, msg) => {
    const data = msg.toString().trim();
    console.log("收到设备: " + data);
    lastSeen = Date.now();


    const display = document.getElementById("doorStateDisplay");


    if (["UP", "UP_OK"].includes(data)) {
        display.innerHTML = "<span style='color: #007aff'>▲ 正在升门...</span>";
    } else if (["DOWN", "DOWN_OK"].includes(data)) {
        display.innerHTML = "<span style='color: #ff9500'>▼ 正在关门...</span>";
    } else if (["STOP", "STOP_OK", "ONLINE", "IDLE"].includes(data)) {
        display.innerHTML = "<span style='color: #34c759'>⏹ 门已就绪（停止）</span>";
    } else if (data === "TIMEOUT_STOP") {
        display.innerHTML = "<span style='color: #ff3b30'>⚠ 15秒超时保护停止</span>";
    } else if (data === "OTA_START") {
        display.innerHTML = "<span style='color: #5856d6'>⏳ 正在 OTA 升级，请勿断电...</span>";
    }
});


// 离线检测
setInterval(() => {
    if (Date.now() - lastSeen > 35000) {
        document.getElementById("doorStateDisplay").innerHTML = 
            "<span style='color: #ff3b30'>🔴 设备已离线或未通电</span>";
    }
}, 5000);


function send(cmd) {
    if (client.connected) {
        client.publish(cmdTopic, cmd, { qos: 1, retain: false });
        console.log("发送指令:", cmd);
    } else {
        alert("未连接到云端，请刷新页面");
    }
}


function saveTimer() {
    const e = document.getElementById("enable").checked ? 1 : 0;
    const s = document.getElementById("start").value || "08:00";
    const t = document.getElementById("end").value || "18:00";
    send(`SET_TIMER_${e}_${s}_${t}`);
    alert("定时指令已发送");
}


function triggerOTA() {
    if (confirm("确定要远程升级固件吗？\n升级期间设备会重启。")) {
        send('OTA');
    }
}
</script>
</body>
</html>
